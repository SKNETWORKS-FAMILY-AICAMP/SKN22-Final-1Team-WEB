<div
  class="mirrai-chatbot"
  data-chatbot-component
  data-chatbot-endpoint="{{ chatbot_endpoint|default:'/api/v1/admin/chatbot/ask/' }}"
  data-chatbot-title="{{ chatbot_title|default:'시술 가이드 AI' }}"
  data-chatbot-status-text="{{ chatbot_status_text|default:'실시간 응답 준비' }}"
  data-chatbot-greeting="{{ chatbot_greeting|default:'안녕하세요. MirrAI 시술 가이드 AI입니다.\n시술 순서, 준비 사항, 주의사항을 질문해 보세요.' }}"
  data-chatbot-placeholder="{{ chatbot_placeholder|default:'질문을 입력해 주세요' }}"
  data-chatbot-trigger-title="{{ chatbot_trigger_title|default:'챗봇 열기' }}"
  data-chatbot-quick-prompts="{{ chatbot_quick_prompts_json|default:'[]' }}"
>
  <button type="button" class="chatbot-trigger" data-chatbot-trigger title="{{ chatbot_trigger_title|default:'챗봇 열기' }}">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </button>

  <div class="chatbot-panel" data-chatbot-panel>
    <header class="chat-header">
      <div class="chat-header-info">
        <div class="chat-status-dot"></div>
        <div class="stack" style="gap: 2px;">
          <strong style="font-size: 15px;" data-chatbot-title-text>{{ chatbot_title|default:'시술 가이드 AI' }}</strong>
          <span style="font-size: 11px; opacity: 0.7;" data-chatbot-status-copy>{{ chatbot_status_text|default:'실시간 응답 준비' }}</span>
        </div>
      </div>
      <button type="button" data-chatbot-close style="background: transparent; border: none; color: white; cursor: pointer; padding: 4px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <div class="chat-messages" data-chatbot-messages>
      <div class="message bot" data-role="bot" data-message-text="{{ chatbot_greeting|default:'안녕하세요. MirrAI 시술 가이드 AI입니다.\n시술 순서, 준비 사항, 주의사항을 질문해 보세요.' }}">
        <div class="message-body">{{ chatbot_greeting|default:'안녕하세요. MirrAI 시술 가이드 AI입니다.\n시술 순서, 준비 사항, 주의사항을 질문해 보세요.'|linebreaksbr }}</div>
        <span class="time" data-chatbot-start-time></span>
      </div>

      <div data-chatbot-quick-prompts class="chatbot-quick-prompts"></div>
    </div>

    <div data-chatbot-typing class="is-hidden" style="padding: 0 24px 12px; background: #f8fafc;">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <form class="chat-input-area" data-chatbot-form>
      <input
        type="text"
        data-chatbot-input
        class="chat-input"
        placeholder="{{ chatbot_placeholder|default:'질문을 입력해 주세요' }}"
        autocomplete="off"
      >
      <button type="submit" class="chat-send-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>
</div>
