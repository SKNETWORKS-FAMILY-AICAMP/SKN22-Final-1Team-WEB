{% extends "layouts/base_site.html" %}

{% block page_title %}MirrAI | 최신 헤어 트렌드{% endblock %}

{% block hero_content %}
<div style="max-width: 1200px; margin: 0 auto; width: 100%;">
  <h2 class="hero-title" style="margin-bottom: 0; font-size: 24px;"><span>최신 헤어 트렌드 5선</span></h2>
</div>
{% endblock %}

{% block extra_head %}
<style>
  .trend-feed {
    display: grid;
    gap: 24px;
  }

  .trend-feed-header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .trend-slider-shell {
    overflow: hidden;
  }

  .trend-slider-track {
    display: flex;
    gap: 24px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-padding-inline: 8px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 4px 8px 12px;
    overscroll-behavior-x: contain;
    touch-action: pan-x;
  }

  .trend-slider-track::-webkit-scrollbar {
    display: none;
  }

  .trend-feed-card {
    display: flex;
    flex-direction: column;
    flex: 0 0 clamp(340px, 42vw, 520px);
    gap: 18px;
    min-height: 100%;
    overflow: hidden;
    scroll-snap-align: start;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .trend-feed-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 36px rgba(17, 17, 17, 0.08);
  }

  .trend-feed-media {
    width: 100%;
    aspect-ratio: 4 / 5;
    border-radius: 22px;
    overflow: hidden;
    background:
      linear-gradient(135deg, rgba(245, 209, 13, 0.18), rgba(17, 17, 17, 0.06)),
      linear-gradient(180deg, #f4f4f4, #e9e9e9);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .trend-feed-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .trend-feed-title {
    font-size: 24px;
    line-height: 1.45;
    margin: 0;
    word-break: keep-all;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .trend-feed-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: -4px;
  }

  .trend-feed-keyword {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 0 12px;
    border-radius: 999px;
    background: rgba(245, 209, 13, 0.16);
    border: 1px solid rgba(245, 209, 13, 0.34);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .trend-feed-empty {
    text-align: center;
    color: var(--text-secondary);
  }

  .trend-feed-empty strong {
    display: block;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  @media (max-width: 1180px) {
    .trend-feed {
      gap: 28px;
    }

    .trend-feed-card {
      flex-basis: min(74vw, 560px);
      gap: 20px;
    }

    .trend-feed-media {
      aspect-ratio: 5 / 6;
    }

    .trend-feed-title {
      font-size: 26px;
    }
  }

  @media (max-width: 900px) {
    .trend-feed-card {
      flex-basis: min(82vw, 520px);
    }
  }

  @media (max-width: 640px) {
    .trend-slider-track {
      gap: 16px;
    }

    .trend-feed-card {
      flex-basis: min(88vw, 420px);
    }

    .trend-feed-title {
      font-size: 20px;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="trend-feed" style="max-width: 1200px; margin: 0 auto;">
  <div class="trend-feed-header">
    <a href="{{ back_url|default:'#' }}" class="session-btn" style="height: 40px; background: #fff;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      메인으로
    </a>
  </div>

  <div id="trendLoading" class="panel" style="padding: 28px; text-align: center;">최신 트렌드를 불러오는 중입니다...</div>

  <div id="trendSliderShell" class="trend-slider-shell" style="display: none;">
    <div id="trendTrack" class="trend-slider-track"></div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
  (function () {
    const loading = document.getElementById("trendLoading");
    const sliderShell = document.getElementById("trendSliderShell");
    const track = document.getElementById("trendTrack");
    const placeholderSvg = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">' +
      '<rect width="640" height="480" fill="#f1f1f1"/>' +
      '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#707070" font-family="Arial, sans-serif" font-size="28">No image</text>' +
      "</svg>"
    );

    function renderEmpty(message) {
      loading.remove();
      sliderShell.style.display = "block";
      track.innerHTML = `
        <article class="panel trend-feed-empty" style="padding: 40px;">
          <strong>최신 트렌드 데이터가 아직 준비되지 않았습니다.</strong>
          <span>${message}</span>
        </article>
      `;
    }

    async function fetchLatestTrends() {
      try {
        const response = await fetch("/api/v1/analysis/trend/latest/?limit=5");
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || data.message || "최신 트렌드를 불러오지 못했습니다.");
        }

        const items = Array.isArray(data.items) ? data.items : [];
        loading.remove();
        sliderShell.style.display = "block";

        if (!items.length) {
          renderEmpty("크롤링된 결과가 없거나 아직 정제되지 않았습니다.");
          return;
        }

        track.innerHTML = items.map((item) => {
          const imageUrl = item.image_url || placeholderSvg;
          const articleUrl = item.article_url || "#";
          const title = item.title_ko || item.title || "제목 없음";
          const keywords = Array.isArray(item.keywords) ? item.keywords.slice(0, 2) : [];
          const keywordMarkup = keywords.length
            ? `<div class="trend-feed-keywords">${keywords.map((keyword) => `<span class="trend-feed-keyword">${keyword}</span>`).join("")}</div>`
            : "";

          return `
            <a href="${articleUrl}" target="_blank" rel="noopener noreferrer" class="panel trend-feed-card" style="padding: 20px;">
              <div class="trend-feed-media">
                <img src="${imageUrl}" alt="${title}" loading="lazy" onerror="this.src='${placeholderSvg}'">
              </div>
              <h4 class="trend-feed-title">${title}</h4>
              ${keywordMarkup}
            </a>
          `;
        }).join("");
      } catch (error) {
        renderEmpty(error.message || "최신 트렌드를 불러오지 못했습니다.");
      }
    }

    fetchLatestTrends();
  })();
</script>
{% endblock %}
