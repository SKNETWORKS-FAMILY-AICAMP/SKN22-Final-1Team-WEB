name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'mirrai_project/**'
      - 'static/**'
      - 'templates/**'
      - 'Dockerfile'
      - 'manage.py'
      - 'requirements.txt'
      - 'Dockerrun.aws.json'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  EB_APP_NAME: ${{ secrets.EB_APPLICATION_NAME }}
  EB_ENV_NAME: ${{ secrets.EB_ENVIRONMENT_NAME }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Inject image URI into Dockerrun.aws.json
        run: |
          python - << 'PY'
          import json
          import os

          with open('Dockerrun.aws.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          data['Image']['Name'] = os.environ['IMAGE_URI']

          with open('Dockerrun.aws.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY

      - name: Create deployment package
        run: zip deploy.zip Dockerrun.aws.json

      - name: Upload version and deploy to Elastic Beanstalk
        env:
          VERSION_LABEL: deploy-${{ github.sha }}-${{ github.run_number }}
        run: |
          S3_BUCKET=$(aws elasticbeanstalk create-storage-location --query "S3Bucket" --output text)

          aws s3 cp deploy.zip "s3://$S3_BUCKET/$EB_APP_NAME/$VERSION_LABEL.zip"

          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APP_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket="$S3_BUCKET",S3Key="$EB_APP_NAME/$VERSION_LABEL.zip"

          aws elasticbeanstalk update-environment \
            --environment-name "$EB_ENV_NAME" \
            --version-label "$VERSION_LABEL"

      - name: Wait for environment update to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names "$EB_ENV_NAME"
