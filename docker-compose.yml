version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=mirrai_db
      - POSTGRES_USER=mirrai_user
      - POSTGRES_PASSWORD=mirrai_pass
    expose:
      - 5432

  redis:
    image: redis:7-alpine
    expose:
      - 6379
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 mirrai_project.wsgi:application"
    volumes:
      - .:/app
      - storage_data:/app/storage
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-key-from-compose
      - DATABASE_URL=postgres://mirrai_user:mirrai_pass@db:5432/mirrai_db
      - LOCAL_DATABASE_URL=postgres://mirrai_user:mirrai_pass@db:5432/mirrai_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: .
      args:
        INSTALL_TRENDS_DEPS: 1
    command: python manage.py run_trend_scheduler
    volumes:
      - .:/app
      - storage_data:/app/storage
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-key-from-compose
      - DATABASE_URL=postgres://mirrai_user:mirrai_pass@db:5432/mirrai_db
      - LOCAL_DATABASE_URL=postgres://mirrai_user:mirrai_pass@db:5432/mirrai_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  storage_data:
