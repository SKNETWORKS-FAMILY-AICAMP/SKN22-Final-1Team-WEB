version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=mirrai_db
      - POSTGRES_USER=mirrai_user
      - POSTGRES_PASSWORD=mirrai_pass
    expose:
      - 5432

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 mirrai_project.wsgi:application"
    volumes:
      - .:/app
      - storage_data:/app/storage
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-key-from-compose
      - DATABASE_URL=postgres://mirrai_user:mirrai_pass@db:5432/mirrai_db
    depends_on:
      - db

volumes:
  postgres_data:
  storage_data:
